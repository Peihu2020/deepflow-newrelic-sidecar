apiVersion: v1
kind: ConfigMap
metadata:
  name: deepflow-agent-config
  namespace: css-infra
data:
  agent.yaml: |
    controller-ips:
      - 127.0.0.1
    controller-port: 30035
    log-file: /var/log/deepflow-agent/deepflow-agent.log
    log-level: info

    static_config:
      ebpf:
        enabled: true
        socket:
          uprobe:
            tls:
              enabled: true
            golang:
              enabled: true
        profile:
          on_cpu:
            disabled: true
            sampling_frequency: 99

      tap_interface_regex: ^(eth.*|en.*|lo|veth.*)
    inputs:
      ebpf:
        socket:
          tunning:
            syscall_trace_id_disabled: false
    processors:
      request_log:
        tunning:
          payload_truncation: 16384   # 从 1024 改为 16384 (16KB)
        application_protocol_inference:
            enabled_protocols:
              - HTTP
              - HTTP2
              - DNS
              - TLS
              - MySQL
              - PostgreSQL
              - Redis
              - MongoDB
              - Oracle
              - Kafka
              - Memcached
        tag_extraction:
          tracing_tag:
            multiple_trace_id_collection: true
            apm_trace_id:
              - traceparent      # W3C Trace Context: 00-TRACEID-SPANID-01
              - sw8              # SkyWalking v8: 1-TRACEID-SEGMENTID-3-PARENT_SERVICE-PARENT_INSTANCE-PARENT_ENDPOINT-IPPORT
              - sw6              # SkyWalking v6: 1-TRACEID-SEGMENTID-3-5-2-IPPORT-ENTRYURI-PARENTURI
              - sw3              # SkyWalking v3: SEGMENTID|SPANID|100|100|#IPPORT|#PARENT_ENDPOINT|#ENDPOINT|TRACEID|SAMPLING
              - uber-trace-id    # Jaeger: TRACEID:SPANID:PARENTSPANID:FLAGS
              - b3               # Zipkin B3: TRACEID-SPANID-1
              - X-B3-TraceId     # Alternative B3 header format
              - X-Request-Id     # Common request ID header
            apm_span_id:
              - traceparent      # W3C format: 00-TRACEID-SPANID-01
              - sw8              # SkyWalking v8 format
              - sw6              # SkyWalking v6 format
              - uber-trace-id    # Jaeger format
              - b3               # Zipkin B3 format: TRACEID-SPANID-1
              - X-B3-SpanId      # Alternative B3 header format
            http_real_client:
              - X_Forwarded_For
              - X-Real-IP
              - True-Client-IP
            x_request_id:
              - X_Request_ID
              - X-Request-Id
            copy_apm_trace_id: true
          custom_fields:
            HTTP:
              - field_name: "traceparent"
              - field_name: "x-request-id"
              - field_name: "x-b3-traceid"
              - field_name: "x-b3-spanid"
            HTTP2:
              - field_name: "traceparent"
              - field_name: "x-request-id"
---
apiVersion: v1
kind: Secret
metadata:
  name: newrelic-secret
  namespace: css-infra
type: Opaque
stringData:
  license_key: "27c4aebef854e3081ea258b1d152ee8eFFFFNRAL"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: deepflow-sidecar
  namespace: css-infra
spec:
  selector:
    matchLabels:
      app: deepflow-sidecar
  template:
    metadata:
      labels:
        app: deepflow-sidecar
    spec:
      hostPID: true
      hostNetwork: true
      containers:
      # DeepFlow Agent 容器
      - name: deepflow-agent
        image: gzdctko-harbor.chowsangsang.com/css-infra/deepflow-agent-patch:v7.1.8
        imagePullPolicy: Always
        securityContext:
          privileged: true
        env:
        - name: K8S_NODE_IP_FOR_DEEPFLOW
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        volumeMounts:
        - name: deepflow-config
          mountPath: /etc/agent.yaml
          subPath: agent.yaml
          readOnly: true
        - name: deepflow-logs
          mountPath: /var/log/deepflow-agent
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys-kernel-debug
          mountPath: /sys/kernel/debug
        - name: sys-kernel-btf
          mountPath: /sys/kernel/btf
          readOnly: true
        # 关键修正：参数必须分开
        command:
        - deepflow-agent
        args:
        - --standalone
        - -f
        - /etc/agent.yaml
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "256Mi"
      
      # New Relic Sidecar 容器
      - name: newrelic-sidecar
        image: gzdctko-harbor.chowsangsang.com/css-infra/deepflow-newrelic-sidecar:1.1
        imagePullPolicy: Always
        env:
        - name: NEW_RELIC_LICENSE_KEY
          valueFrom:
            secretKeyRef:
              name: newrelic-secret
              key: license_key
        - name: NEW_RELIC_ACCOUNT_ID
          value: "4188218"
        - name: NEW_RELIC_APP_NAME
          value: "deepflow-agent"
        - name: DEEPFLOW_LOG_DIR
          value: "/var/log/deepflow-agent"
        - name: BATCH_SIZE
          value: "100"
        - name: FLUSH_INTERVAL
          value: "5s"
        - name: LOG_LEVEL
          value: "info"
        - name: EVENT_TYPE_L7
          value: "DeepFlowL7Log"
        - name: EVENT_TYPE_L4
          value: "DeepFlowL4Log"
        - name: EVENT_TYPE_METRICS
          value: "DeepFlowFlowMetrics"
        volumeMounts:
        - name: deepflow-logs
          mountPath: /var/log/deepflow-agent
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
      
      volumes:
      - name: deepflow-config
        configMap:
          name: deepflow-agent-config
      - name: deepflow-logs
        emptyDir: {}
      - name: proc
        hostPath:
          path: /proc
      - name: sys-kernel-debug
        hostPath:
          path: /sys/kernel/debug
      - name: sys-kernel-btf
        hostPath:
          path: /sys/kernel/btf
