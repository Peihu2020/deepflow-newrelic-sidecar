log-file: /var/log/deepflow-agent/deepflow-agent.log
log-level: info

global:
  circuit_breakers:
    relative_sys_load:
      trigger_threshold: 2.0
      recovery_threshold: 1.5
      metric: load1
  limits:
    max_memory: 1024
    max_millicpus: 1000
  standalone_mode:
    max_data_file_size: 10
    data_file_dir: /var/log/deepflow-agent/

# ============================================
# NEW: CUSTOM FORWARDER - PROFILER DATA
# ============================================
custom_forward:
  enabled: true
  endpoint: "http://127.0.0.1:8080/api/profiler"   # Point to your sidecar
  batch_size: 100
  flush_interval_secs: 5

inputs:
  proc:
    process_matcher:
      # - match_regex: ^httpd$
      #   match_type: process_name
      #   only_in_container: false
      #   enabled_features:
      #     - ebpf.socket.uprobe.tls
      #     - proc.gprocess_info
      # ========== NEW: Profile deepflow processes ==========
      # - match_regex: ^deepflow-
      #   match_type: process_name
      #   only_in_container: false
      #   enabled_features:
      #     - ebpf.profile.on_cpu
      #     - proc.gprocess_info
      # ========== NEW: Profile Java processes ==========
      - match_regex: ^java
        match_type: process_name
        only_in_container: false
        enabled_features:
          - ebpf.profile.on_cpu
          - proc.gprocess_info
      # Disable everything else by using a rule that matches nothing
      - match_regex: .*
        match_type: process_name
        only_in_container: false   # ← CHANGE to false
        ignore: true              # ← Drops ALL other processes
        enabled_features: []
      # ========== NEW: Profile C/C++ processes (optional - for testing) ==========
      # - match_regex: .*
      #   match_type: process_name
      #   only_in_container: false
      #   enabled_features:
      #     - ebpf.profile.on_cpu
      #     - proc.gprocess_info

  cbpf:
    af_packet:
      interface_regex: ^(eth.*|en.*|veth.*)$

  ebpf:
    disabled: false
    profile:
      on_cpu:
        disabled: false
        sampling_frequency: 99
        aggregate_by_cpu: false
      off_cpu:
        disabled: true
      memory:
        disabled: true
      unwinding:
        dwarf_disabled: false
        dwarf_regex: ".*"
        dwarf_process_map_size: 1024
        dwarf_shard_map_size: 128
      languages:
        python_disabled: true
        php_disabled: true
        nodejs_disabled: true
        lua_disabled: true
    socket:
      uprobe:
        tls:
          enabled: true
      tunning:
        syscall_trace_id_disabled: false

processors:
  request_log:
    timeouts:
      tcp_request_timeout: 1800s
      session_aggregate:
      - protocol: HTTP
        timeout: 1800s
    tunning:
      payload_truncation: 16384
    application_protocol_inference:
      enabled_protocols:
        - HTTP
        - HTTP2
        - TLS
        - MySQL
        - PostgreSQL
        - Redis
        - MongoDB
        - Oracle
        - Kafka
        - Memcached
    tag_extraction:
      tracing_tag:
        multiple_trace_id_collection: true
        apm_trace_id:
          - traceparent
          - sw8
          - sw6
          - sw3
          - uber-trace-id
          - b3
          - X-B3-TraceId
          - X-Request-Id
        apm_span_id:
          - traceparent
          - sw8
          - sw6
          - uber-trace-id
          - b3
          - X-B3-SpanId
        http_real_client:
          - X-Forwarded-For
          - X-Real-IP
          - True-Client-IP
        x_request_id:
          - X_Request_ID
          - X-Request-Id
        copy_apm_trace_id: true
      custom_fields:
        HTTP:
          - field_name: "traceparent"
          - field_name: "x-request-id"
          - field_name: "x-b3-traceid"
          - field_name: "x-b3-spanid"
        HTTP2:
          - field_name: "traceparent"
          - field_name: "x-request-id"

outputs:
  flow_metrics:
    enabled: false  # ← Disable metrics output
  flow_log:
    throttles:
      l4_throttle: 10000
      l7_throttle: 10000
  http_forward:
    enabled: true
    url: "http://127.0.0.1:8080/api/deepflow-data"
    timeout_seconds: 30
    batch_size: 100
    queue_size: 20000