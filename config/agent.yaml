log-file: /var/log/deepflow-agent/deepflow-agent.log
log-level: info

global:
  limits:
    max_memory: 1024
    max_millicpus: 1000
  standalone_mode:
    max_data_file_size: 10
    data_file_dir: /var/log/deepflow-agent/

l7-protocol-enabled:
  - HTTP
  - HTTP2
  - TLS
  - MySQL
  - PostgreSQL
  - Redis
  - MongoDB
  - Oracle
  - Kafka
  - Memcached

custom_forward:
  enabled: true
  endpoint: "http://127.0.0.1:8080/api/profiler"
  batch_size: 100
  flush_interval_secs: 5

inputs:
  proc:
    proc_dir_path: /host/proc
    enabled: true
    process_matcher:
      - match_regex: .*java.*
        match_type: cmdline
        only_in_container: true
        rewrite_name: java
        enabled_features: [ebpf.profile.on_cpu, ebpf.socket.uprobe.tls, proc.gprocess_info]
      - match_regex: .*
        match_type: process_name
        only_in_container: false
        enabled_features:
          # - ebpf.profile.on_cpu
          - ebpf.socket.uprobe.tls
          - proc.gprocess_info

  cbpf:
    af_packet:
      interface_regex: ^(eth.*|en.*|veth.*)$

  ebpf:
    disabled: false
    profile:
      on_cpu:
        disabled: false
        sampling_frequency: 99
        aggregate_by_cpu: false
      off_cpu:
        disabled: true
      memory:
        disabled: true
      unwinding:
        dwarf_disabled: false
        dwarf_regex: ".*"
        dwarf_process_map_size: 1024
        dwarf_shard_map_size: 128
      languages:
        python_disabled: true
        php_disabled: true
        nodejs_disabled: true
        lua_disabled: true
    socket:
      uprobe:
        tls:
          enabled: true
      tunning:
        syscall_trace_id_disabled: false

processors:
  request_log:
    timeouts:
      tcp_request_timeout: 1800s
      session_aggregate:
      - protocol: HTTP
        timeout: 1800s
    tunning:
      payload_truncation: 16384
    application_protocol_inference:
      enabled_protocols:
        - HTTP
        - HTTP2
        - TLS
        - MySQL
        - PostgreSQL
        - Redis
        - MongoDB
        - Oracle
        - Kafka
        - Memcached
    tag_extraction:
      tracing_tag:
        multiple_trace_id_collection: true
        apm_trace_id:
          - traceparent
          - sw8
          - sw6
          - sw3
          - uber-trace-id
          - b3
          - X-B3-TraceId
          - X-Request-Id
        apm_span_id:
          - traceparent
          - sw8
          - sw6
          - uber-trace-id
          - b3
          - X-B3-SpanId
        http_real_client:
          - X-Forwarded-For
          - X-Real-IP
          - True-Client-IP
        x_request_id:
          - X_Request_ID
          - X-Request-Id
        copy_apm_trace_id: true
      custom_fields:
        HTTP:
          - field_name: "traceparent"
          - field_name: "x-request-id"
          - field_name: "x-b3-traceid"
          - field_name: "x-b3-spanid"
        HTTP2:
          - field_name: "traceparent"
          - field_name: "x-request-id"

outputs:
  flow_log:
    throttles:
      l4_throttle: 10000
      l7_throttle: 10000
  http_forward:
    enabled: true
    url: "http://127.0.0.1:8080/api/deepflow-data"
    timeout_seconds: 30
    batch_size: 100
    queue_size: 20000
    exclude_traffic:
      - ip_src: "127.0.0.1"
        port_dst: 9092
      - ip_src: "127.0.0.1"
        port_dst: 8080
      - ip_dst: "10.8.152.58"
        port_dst: 9092
      - ip_dst: "10.8.152.29"
        port_dst: 9092
      - domain: "insights-collector.newrelic.com"