# daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: deepflow-agent
  namespace: css-infra
  labels:
    app: deepflow
    component: agent
spec:
  selector:
    matchLabels:
      app: deepflow
      component: agent
  template:
    metadata:
      labels:
        app: deepflow
        component: agent
    spec:
      hostNetwork: false
      
      containers:
      # DeepFlow Agent
      - name: deepflow-agent
        image: gzdctko-harbor.chowsangsang.com/css-infra/deepflow-agent-patch:v7.1.8
        imagePullPolicy: Always
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: cgroup
          mountPath: /host/sys/fs/cgroup
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        securityContext:
          privileged: true
        # TCP probe for agent
        livenessProbe:
          tcpSocket:
            port: 39090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 39090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
      # NewRelic Sidecar Container
      - name: deepflow-newrelic-sidecar
        image: gzdctko-harbor.chowsangsang.com/css-infra/deepflow-newrelic-sidecar:1.3
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: sidecar-http
        
        volumeMounts:
        - name: sidecar-data
          mountPath: /app/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # TCP probe for sidecar
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
      volumes:
      - name: sidecar-data
        emptyDir: {}
      - name: proc
        hostPath:
          path: /proc
      - name: sys
        hostPath:
          path: /sys
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
      
      tolerations:
      - operator: Exists