apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: deepflow-agent
  namespace: css-infra
  labels:
    app: deepflow
    component: agent
spec:
  selector:
    matchLabels:
      app: deepflow
      component: agent
  template:
    metadata:
      labels:
        app: deepflow
        component: agent
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      
      containers:
      # DeepFlow Agent
      - name: deepflow-agent
        image: gzdctko-harbor.chowsangsang.com/css-infra/deepflow-agent-patch:v7.1.8.6
        imagePullPolicy: Always
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        
        volumeMounts:
        # 重要：挂载debugfs使eBPF正常工作
        - name: debug
          mountPath: /sys/kernel/debug
          readOnly: true
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: sys
          mountPath: /host/sys
          readOnly: true
        - name: cgroup
          mountPath: /host/sys/fs/cgroup
          readOnly: true
        # ========== NEW: Mount agent config from ConfigMap ==========
        - name: agent-config
          mountPath: /app/agent.yaml
          subPath: agent.yaml
          readOnly: true
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
        
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
            - SYS_RESOURCE
            - SYS_PTRACE
            - NET_ADMIN
            - NET_RAW
            - IPC_LOCK
            - SYSLOG  # 🔥 新增：允许读取 /proc/kallsyms，解决 ON-CPU 权限问题
        
        # Agent在39090端口提供健康检查
        livenessProbe:
          tcpSocket:
            port: 39090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 39090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
      # NewRelic Sidecar - 接收agent数据
      - name: deepflow-newrelic-sidecar
        image: gzdctko-harbor.chowsangsang.com/css-infra/deepflow-newrelic-sidecar:1.5
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: sidecar-http
        
        volumeMounts:
        - name: sidecar-data
          mountPath: /app/data
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1.5Gi"
            cpu: "500m"
        
        # Sidecar在8080端口提供健康检查
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
      volumes:
      - name: sidecar-data
        emptyDir: {}
      - name: debug
        hostPath:
          path: /sys/kernel/debug
          type: DirectoryOrCreate
      - name: proc
        hostPath:
          path: /proc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      # ========== NEW: ConfigMap volume for agent.yaml ==========
      - name: agent-config
        configMap:
          name: deepflow-agent-config
          defaultMode: 0644